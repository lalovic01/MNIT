<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MNIT Redirect</title>
    <script>
      ;(function () {
        const path = window.location.pathname
          .replace(/\/$/, '')
          .replace(/^\//, '')
          .split('/')
          .slice(1)
          .join('/')
        const redirectUrl =
          window.location.origin +
          window.location.pathname.split('/').slice(0, 2).join('/') +
          '/?/' +
          path.replace(/&/g, '~and~') +
          (window.location.search ? '&' + window.location.search.slice(1).replace(/&/g, '~and~') : '') +
          window.location.hash
        window.location.replace(redirectUrl)
      })()
    </script>
  </head>
  <body></body>
</html>
